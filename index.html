<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protect Earth Center | PEC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-emerald-50 font-sans">
    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-emerald-600 flex items-center"><i class="fas fa-leaf mr-2"></i>PEC</h1>
            <div class="space-x-6 text-gray-600 font-semibold">
                <a href="#" class="hover:text-emerald-600">Home</a>
                <a href="#services" class="hover:text-emerald-600">Services</a>
                <a href="#" class="bg-emerald-600 text-white px-4 py-2 rounded-full">Join Now</a>
            </div>
        </div>
    </nav>

    <header class="py-20 px-4 text-center">
        <h2 class="text-5xl font-black text-slate-800 mb-6">Protect Our Earth,<br><span class="text-emerald-600">Save Our Future</span></h2>
        <p class="text-gray-600 max-w-xl mx-auto text-lg mb-10">这是为您生成的 Protect Earth Center 官方网站。致力于环境保护与可持续发展。</p>
        <button class="bg-emerald-600 text-white px-10 py-4 rounded-full font-bold shadow-xl hover:scale-105 transition">Explore Now</button>
    </header>

    <section id="services" class="max-w-6xl mx-auto py-16 px-4 grid md:grid-cols-3 gap-8">
        <div class="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-emerald-500 text-center">
            <i class="fas fa-recycle text-4xl text-emerald-500 mb-4"></i>
            <h4 class="text-xl font-bold mb-2">Waste Free</h4>
            <p class="text-gray-500 text-sm">减少垃圾，保护海洋。</p>
        </div>
        <div class="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-emerald-500 text-center">
            <i class="fas fa-solar-panel text-4xl text-emerald-500 mb-4"></i>
            <h4 class="text-xl font-bold mb-2">Clean Energy</h4>
            <p class="text-gray-500 text-sm">推广太阳能，绿色生活。</p>
        </div>
        <div class="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-emerald-500 text-center">
            <i class="fas fa-tree text-4xl text-emerald-500 mb-4"></i>
            <h4 class="text-xl font-bold mb-2">Forest Care</h4>
            <p class="text-gray-500 text-sm">种下一棵树，收获一片森林。</p>
        </div>
    </section>

    <footer class="bg-slate-900 text-white py-12 text-center mt-20">
        <p class="text-emerald-400 font-bold text-xl mb-4">Protect Earth Center</p>
        <p class="text-gray-500 text-sm">© 2026 Tey Yew Kuan | PEC Project Submission</p>
    </footer>
</body>
</html>
